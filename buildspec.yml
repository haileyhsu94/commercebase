version: 0.2
# CommerceBase / ads.realry.com — CodeBuild buildspec
# Mirrors realry/buildspec.yml pattern: ECR push of single image with short-commit tag.
# CodePipeline updates ECS service via imagedefinitions.json artifact.

env:
  variables:
    AWS_REGION: "us-east-1"
    ECR_REPO: "ads-realry"
    CONTAINER_NAME: "ads-web-fargate"

phases:
  pre_build:
    on-failure: ABORT
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO"
      - COMMIT_ID="${CODEBUILD_RESOLVED_SOURCE_VERSION:-$CODEBUILD_SOURCE_VERSION}"
      - SHORT_COMMIT_ID=$(git rev-parse --short HEAD)
      - echo "ACCOUNT_ID=$ACCOUNT_ID"
      - echo "ECR_URI=$ECR_URI"
      - echo "COMMIT_ID=$COMMIT_ID"
      - echo "SHORT_COMMIT_ID=$SHORT_COMMIT_ID"
      - echo "CONTAINER_NAME=$CONTAINER_NAME"
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

  build:
    on-failure: ABORT
    commands:
      - export DOCKER_BUILDKIT=1
      - docker buildx build --platform linux/arm64 --target container-service -t "$CONTAINER_NAME" -f Dockerfile .

  post_build:
    on-failure: ABORT
    commands:
      - docker tag "$CONTAINER_NAME:latest" "$ECR_URI:$SHORT_COMMIT_ID"
      - docker tag "$CONTAINER_NAME:latest" "$ECR_URI:prod"
      - docker push "$ECR_URI:$SHORT_COMMIT_ID"
      - docker push "$ECR_URI:prod"
      - DIGEST=$(aws ecr describe-images --repository-name "$ECR_REPO" --image-ids imageTag="$SHORT_COMMIT_ID" --query 'imageDetails[0].imageDigest' --output text)
      - printf '[{"name":"%s","imageUri":"%s@%s"}]\n' "$CONTAINER_NAME" "$ECR_URI" "$DIGEST" > imagedefinitions.json
    finally:
      - docker logout "$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com" || true
      - rm -f ~/.docker/config.json || true

artifacts:
  files:
    - imagedefinitions.json
