worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request_method $request_uri" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # PHP-FPM upstream (unix socket, Ubuntu default)
    upstream php-fpm {
        server unix:/run/php/php8.4-fpm.sock;
    }

    server {
        listen 8000;
        server_name _;
        root /var/www/public;
        index index.php;

        # Health check (lightweight)
        location = /api/health {
            try_files $uri /index.php?$query_string;
        }

        # API routes → PHP-FPM
        location /api {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM
        location ~ \.php$ {
            fastcgi_pass php-fpm;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 600;  # browser automation can take >30s
        }

        # Static (if any served from this image)
        location /assets {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Anything else (frontend SPA paths handled by Vercel/Cloudflare, but
        # allow direct access to root index.php for debug)
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ /\. {
            deny all;
        }
    }
}
